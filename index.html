<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#3d3d3d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- Default fallback title/description for crawlers that don't run JS.
         Per-route title, description, OG tags & canonical are injected dynamically
         by SEO.tsx (react-helmet-async). Keep this generic — do NOT specialize. -->
    <title>Hôtel Inn Design Paris Place d'Italie</title>
    <meta name="description" content="Hôtel 3 étoiles à Paris 13ème, proche métro Place d'Italie. Chambres, séminaires, petit-déjeuner." />
    <meta name="author" content="Hôtel Inn Design Paris" />
    
    <!-- Google Tag Manager — deferred after page load -->
    <script>
      window.addEventListener('load', function() {
        (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
        new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
        j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
        'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
        })(window,document,'script','dataLayer','GTM-P2JQL82K');
      });
    </script>
    <!-- End Google Tag Manager -->
    
    <!-- Preconnect to external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://flagcdn.com" />
    <link rel="preconnect" href="https://www.googletagmanager.com" />
    <link rel="dns-prefetch" href="https://www.thehotelsnetwork.com" />
    <link rel="dns-prefetch" href="https://gustaves.ai" />
    
    <!-- Load fonts — non-blocking, reduced weights -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;700&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;700&display=swap" /></noscript>

    <!-- Open Graph -->
    <meta property="og:title" content="Hôtel Inn Design Paris Place d'Italie" />
    <meta property="og:description" content="Hôtel 3 étoiles à Paris 13ème, proche métro Place d'Italie. Chambres confortables et salles de séminaires." />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="fr_FR" />
    <meta property="og:site_name" content="Hôtel Inn Design Paris" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Hôtel Inn Design Paris Place d'Italie" />
    <meta name="twitter:description" content="Hôtel 3 étoiles à Paris 13ème, proche métro Place d'Italie." />
    
    <!-- Canonical: injected dynamically by SEO.tsx (react-helmet-async) per route. Do NOT hardcode here. -->
    
    <!-- Favicon -->
    <link rel="icon" href="/favicon.png" type="image/png" />
    
    <!-- Critical inline CSS for instant first paint -->
    <style>
      #root{min-height:100vh}
      body{margin:0;background:#f5f3ef;font-family:'DM Sans',system-ui,sans-serif;color:#2a2520}
      .page-skeleton{min-height:100vh;background:#2a2520}
    </style>
    
    <!-- The Hotels Network — deferred after page load -->
    <script>
      window.addEventListener('load', function() {
        var s = document.createElement('script');
        s.src = 'https://www.thehotelsnetwork.com/js/loader.js?property_id=1164259';
        s.async = true;
        document.head.appendChild(s);
      });
    </script>
  </head>

  <body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-P2JQL82K"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

</html>
